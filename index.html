```html
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Учет финансов</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden h-screen w-screen">
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const CATEGORIES = [
      "Покупки в супермаркете",
      "Выезды с семьей/подарки",
      "Расходы на дом",
      "Необходимые траты",
      "Питание вне дома",
      "Траты на машину",
      "Личные траты",
      "Уход/здоровье",
      "Садака",
      "Форс мажор"
    ];

    const COLORS = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e', '#06b6d4', '#3b82f6', '#6366f1', '#a855f7', '#ec4899'];

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [data, setData] = useState(() => {
        const saved = localStorage.getItem('finance_data');
        if (saved) {
          try { return JSON.parse(saved); } catch (e) { console.error("Parse error"); }
        }
        return {
          transactions: [],
          limits: CATEGORIES.reduce((acc, cat) => ({...acc, [cat]: 0}), {}),
          goals: []
        };
      });

      useEffect(() => {
        localStorage.setItem('finance_data', JSON.stringify(data));
      }, [data]);

      const addTransaction = (tx) => {
        setData(prev => ({
          ...prev,
          transactions: [{ ...tx, id: Date.now().toString(), date: tx.date || new Date().toISOString() }, ...prev.transactions]
        }));
      };

      const deleteTransaction = (id) => {
        setData(prev => ({ ...prev, transactions: prev.transactions.filter(t => t.id !== id) }));
      };

      const currentMonth = new Date().toISOString().slice(0, 7);
      const totalIncome = data.transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
      const totalExpense = data.transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
      const totalToPiggy = data.transactions.filter(t => t.type === 'savings_deposit').reduce((sum, t) => sum + t.amount, 0);
      const totalFromPiggy = data.transactions.filter(t => t.type === 'savings_withdrawal').reduce((sum, t) => sum + t.amount, 0);
      
      const availableBalance = totalIncome - totalExpense - totalToPiggy;
      const piggyBalance = totalToPiggy - totalFromPiggy;

      return (
        <div className="flex flex-col h-full bg-gray-50">
          <header className="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10">
            <h1 className="text-xl font-bold text-gray-800">Учет финансов</h1>
            <div className="text-sm font-medium text-gray-500">{new Date().toLocaleDateString('ru-RU', {day: 'numeric', month: 'long'})}</div>
          </header>
          
          <main className="flex-1 overflow-y-auto pb-20">
            {activeTab === 'home' && <Dashboard data={data} availableBalance={availableBalance} piggyBalance={piggyBalance} deleteTransaction={deleteTransaction} />}
            {activeTab === 'add' && <AddTransaction addTransaction={addTransaction} goals={data.goals} goHome={() => setActiveTab('home')} />}
            {activeTab === 'limits' && <LimitsManager data={data} setData={setData} currentMonth={currentMonth} />}
            {activeTab === 'piggy' && <PiggyBankView data={data} setData={setData} piggyBalance={piggyBalance} />}
            {activeTab === 'stats' && <StatsView data={data} />}
            {activeTab === 'settings' && <SettingsView data={data} setData={setData} />}
          </main>

          <nav className="bg-white border-t border-gray-200 fixed bottom-0 w-full flex justify-around p-2 z-20 pb-safe">
            <NavBtn id="home" icon="ph-house" label="Главная" active={activeTab} set={setActiveTab} />
            <NavBtn id="limits" icon="ph-list-numbers" label="Лимиты" active={activeTab} set={setActiveTab} />
            <NavBtn id="add" icon="ph-plus-circle" iconClass="text-[28px] text-blue-600" label="Добавить" active={activeTab} set={setActiveTab} />
            <NavBtn id="piggy" icon="ph-piggy-bank" label="Копилка" active={activeTab} set={setActiveTab} />
            <NavBtn id="stats" icon="ph-chart-pie-slice" label="Отчеты" active={activeTab} set={setActiveTab} />
          </nav>
        </div>
      );
    }

    function NavBtn({ id, icon, iconClass, label, active, set }) {
      return (
        <button onClick={() => set(id)} className={`flex flex-col items-center p-2 transition-colors ${active === id ? 'text-blue-600' : 'text-gray-400'}`}>
          <i className={`ph ${icon} ${iconClass || "text-2xl"}`}></i>
          <span className="text-[10px] mt-1">{label}</span>
        </button>
      );
    }

    function Dashboard({ data, availableBalance, piggyBalance, deleteTransaction }) {
      const recent = data.transactions.slice(0, 10);
      return (
        <div className="p-4 space-y-6">
          <div className="grid grid-cols-2 gap-4">
            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
              <div className="text-sm text-gray-500 mb-1">Доступно</div>
              <div className={`text-2xl font-bold ${availableBalance < 0 ? 'text-red-500' : 'text-gray-800'}`}>{availableBalance.toLocaleString()} ₽</div>
            </div>
            <div className="bg-gradient-to-br from-blue-500 to-purple-600 p-4 rounded-2xl shadow-sm text-white">
              <div className="text-sm text-blue-100 mb-1">В копилке</div>
              <div className="text-2xl font-bold">{piggyBalance.toLocaleString()} ₽</div>
            </div>
          </div>
          <div className="space-y-3">
            <h2 className="text-lg font-bold">Последние операции</h2>
            {recent.map(t => (
              <div key={t.id} className="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center">
                <div>
                  <div className="font-medium text-sm">{t.type === 'income' ? 'Доход' : t.category || 'Копилка'}</div>
                  <div className="text-[10px] text-gray-400">{new Date(t.date).toLocaleDateString('ru-RU')}</div>
                </div>
                <div className="flex items-center gap-2">
                  <span className={`font-bold ${t.type === 'income' ? 'text-green-500' : 'text-gray-800'}`}>{t.amount} ₽</span>
                  <button onClick={() => deleteTransaction(t.id)} className="text-red-400"><i className="ph ph-trash"></i></button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function AddTransaction({ addTransaction, goals, goHome }) {
      const [type, setType] = useState('expense');
      const [amount, setAmount] = useState('');
      const [category, setCategory] = useState(CATEGORIES[0]);
      const [note, setNote] = useState('');

      const submit = (e) => {
        e.preventDefault();
        if(!amount || isNaN(amount) || Number(amount) <= 0) return;
        addTransaction({ type, amount: Number(amount), category: type === 'expense' ? category : null, note });
        goHome();
      };

      return (
        <form onSubmit={submit} className="p-4 space-y-4">
          <div className="flex bg-gray-200 p-1 rounded-lg">
            {['expense', 'income', 'savings_deposit', 'savings_withdrawal'].map(t => (
              <button key={t} type="button" onClick={() => setType(t)} className={`flex-1 py-2 text-[10px] font-bold rounded-md ${type === t ? 'bg-white shadow' : 'text-gray-500'}`}>
                {t === 'expense' ? 'Расход' : t === 'income' ? 'Доход' : t === 'savings_deposit' ? 'В копилку' : 'Из копилки'}
              </button>
            ))}
          </div>
          <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="Сумма" className="w-full p-4 bg-white border rounded-xl outline-none" inputMode="decimal" />
          {type === 'expense' && <select value={category} onChange={e => setCategory(e.target.value)} className="w-full p-4 border rounded-xl">{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>}
          <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="Заметка" className="w-full p-4 border rounded-xl" />
          <button type="submit" className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold">Сохранить</button>
        </form>
      );
    }

    function LimitsManager({ data, setData, currentMonth }) {
      const [isModalOpen, setModal] = useState(false);
      const [transfer, setTransfer] = useState({ from: CATEGORIES[0], to: CATEGORIES[1], amount: '' });

      const monthExpenses = useMemo(() => {
        const sums = {};
        CATEGORIES.forEach(c => sums[c] = 0);
        data.transactions.filter(t => t.type === 'expense' && t.date.startsWith(currentMonth)).forEach(t => { if(sums[t.category] !== undefined) sums[t.category] += t.amount });
        return sums;
      }, [data.transactions, currentMonth]);

      const updateLimit = (cat, val) => {
        const num = val === '' ? 0 : Number(val);
        setData(prev => ({ ...prev, limits: { ...prev.limits, [cat]: num } }));
      };

      const handleTransfer = () => {
        const val = Number(transfer.amount);
        if (!val || val <= 0 || transfer.from === transfer.to || data.limits[transfer.from] < val) return;
        setData(prev => ({
          ...prev,
          limits: { ...prev.limits, [transfer.from]: prev.limits[transfer.from] - val, [transfer.to]: prev.limits[transfer.to] + val }
        }));
        setModal(false);
        setTransfer({...transfer, amount: ''});
      };

      return (
        <div className="p-4 space-y-4">
          <div className="flex justify-between items-center">
            <h2 className="text-xl font-bold">Лимиты</h2>
            <button onClick={() => setModal(true)} className="text-blue-600 font-bold text-sm flex items-center gap-1"><i className="ph ph-arrows-left-right"></i> Перенести</button>
          </div>
          {CATEGORIES.map(cat => {
            const limit = data.limits[cat] || 0;
            const spent = monthExpenses[cat] || 0;
            return (
              <div key={cat} className="bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                <div className="flex justify-between text-xs mb-2">
                  <span className="font-bold text-gray-600">{cat}</span>
                  <div className="flex items-center gap-2">
                    <span className="text-gray-400">{spent} /</span>
                    <input 
                      type="number" 
                      value={limit === 0 ? '' : limit} 
                      onChange={(e) => updateLimit(cat, e.target.value)}
                      placeholder="0"
                      className="w-20 text-right bg-blue-50 border-none rounded p-1 font-bold outline-none focus:ring-1 focus:ring-blue-300"
                      inputMode="numeric"
                    />
                  </div>
                </div>
                <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                  <div className={`h-full transition-all ${spent > limit && limit > 0 ? 'bg-red-500' : 'bg-green-500'}`} style={{ width: `${limit > 0 ? Math.min(100, (spent/limit)*100) : 0}%` }} />
                </div>
              </div>
            );
          })}
          {isModalOpen && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl w-full p-5 space-y-4">
                <h3 className="font-bold">Перенос лимита</h3>
                <select value={transfer.from} onChange={e=>setTransfer({...transfer, from:e.target.value})} className="w-full p-2 border rounded-lg">{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select>
                <select value={transfer.to} onChange={e=>setTransfer({...transfer, to:e.target.value})} className="w-full p-2 border rounded-lg">{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select>
                <input type="number" value={transfer.amount} onChange={e=>setTransfer({...transfer, amount:e.target.value})} className="w-full p-2 border rounded-lg" placeholder="Сумма" />
                <div className="flex gap-2">
                  <button onClick={()=>setModal(false)} className="flex-1 py-2 bg-gray-100 rounded-lg">Отмена</button>
                  <button onClick={handleTransfer} className="flex-1 py-2 bg-blue-600 text-white rounded-lg">ОК</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function PiggyBankView({ data, setData, piggyBalance }) {
      const [goal, setGoal] = useState({ name: '', target: '' });
      return (
        <div className="p-4 space-y-6">
          <div className="bg-indigo-600 p-6 rounded-2xl text-white text-center shadow-lg">
            <i className="ph ph-piggy-bank text-4xl block mb-2 opacity-80"></i>
            <div className="text-xs opacity-70">Всего в копилке</div>
            <div className="text-3xl font-bold">{piggyBalance.toLocaleString()} ₽</div>
          </div>
          <div className="space-y-4">
            <h3 className="font-bold">Цели</h3>
            <div className="flex gap-2">
              <input type="text" placeholder="Цель" value={goal.name} onChange={e=>setGoal({...goal, name:e.target.value})} className="flex-1 p-2 border rounded-lg text-sm" />
              <input type="number" placeholder="Сумма" value={goal.target} onChange={e=>setGoal({...goal, target:e.target.value})} className="w-24 p-2 border rounded-lg text-sm" />
              <button onClick={()=>{ if(goal.name && goal.target) setData(prev=>({...prev, goals:[...prev.goals, {id:Date.now(), ...goal}]})); setGoal({name:'', target:''}) }} className="bg-indigo-600 text-white p-2 rounded-lg"><i className="ph ph-plus"></i></button>
            </div>
            {data.goals.map(g => (
              <div key={g.id} className="bg-white p-3 rounded-xl border flex justify-between items-center">
                <div><div className="font-bold text-sm">{g.name}</div><div className="text-xs text-gray-400">Надо: {g.target} ₽</div></div>
                <button onClick={()=>setData(prev=>({...prev, goals:prev.goals.filter(x=>x.id!==g.id)}))} className="text-red-400"><i className="ph ph-trash"></i></button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function StatsView({ data }) {
      const filtered = data.transactions.filter(t => t.type === 'expense');
      const total = filtered.reduce((s, t) => s + t.amount, 0);
      const agg = {};
      filtered.forEach(t => { agg[t.category] = (agg[t.category] || 0) + t.amount; });
      const chart = Object.entries(agg).sort((a,b)=>b[1]-a[1]);

      return (
        <div className="p-4 space-y-6">
          <div className="bg-white p-6 rounded-2xl shadow-sm text-center border">
            <div className="text-xs text-gray-400">Всего расходов</div>
            <div className="text-3xl font-bold text-gray-800">{total.toLocaleString()} ₽</div>
          </div>
          <div className="space-y-3">
            {chart.map(([name, val], i) => (
              <div key={name}>
                <div className="flex justify-between text-xs mb-1"><span>{name}</span><span className="font-bold">{val} ₽</span></div>
                <div className="h-2 w-full bg-gray-100 rounded-full"><div className="h-full bg-blue-500 rounded-full" style={{ width: `${(val/total)*100}%` }} /></div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SettingsView({ data, setData }) {
      return (
        <div className="p-4 space-y-4">
          <button onClick={() => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "finance.json"); dl.click();
          }} className="w-full py-4 bg-white border rounded-xl font-bold shadow-sm">💾 Экспорт данных</button>
          <label className="w-full py-4 bg-white border rounded-xl font-bold shadow-sm flex items-center justify-center cursor-pointer">
            📂 Импорт данных <input type="file" className="hidden" onChange={e => {
              const r = new FileReader(); r.onload = x => { setData(JSON.parse(x.target.result)); alert('ОК'); }; r.readAsText(e.target.files[0]);
            }} />
          </label>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

```
