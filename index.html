```html
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Учет финансов</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden h-screen w-screen">
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const CATEGORIES = [
      "Покупки в супермаркете",
      "Выезды с семьей/подарки",
      "Расходы на дом",
      "Необходимые траты",
      "Питание вне дома",
      "Траты на машину",
      "Личные траты",
      "Уход/здоровье",
      "Садака",
      "Форс мажор"
    ];

    const COLORS = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e', '#06b6d4', '#3b82f6', '#6366f1', '#a855f7', '#ec4899'];

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [data, setData] = useState(() => {
        const saved = localStorage.getItem('finance_data');
        if (saved) {
          try { return JSON.parse(saved); } catch (e) { console.error("Parse error"); }
        }
        return {
          transactions: [],
          limits: CATEGORIES.reduce((acc, cat) => ({...acc, [cat]: 0}), {}),
          goals: []
        };
      });

      useEffect(() => {
        localStorage.setItem('finance_data', JSON.stringify(data));
      }, [data]);

      const addTransaction = (tx) => {
        setData(prev => ({
          ...prev,
          transactions: [{ ...tx, id: Date.now().toString(), date: tx.date || new Date().toISOString() }, ...prev.transactions]
        }));
      };

      const deleteTransaction = (id) => {
        setData(prev => ({ ...prev, transactions: prev.transactions.filter(t => t.id !== id) }));
      };

      const currentMonth = new Date().toISOString().slice(0, 7);
      
      // Агрегация данных для расчетов
      const stats = useMemo(() => {
        const income = data.transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
        const expense = data.transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
        const toPiggy = data.transactions.filter(t => t.type === 'savings_deposit').reduce((sum, t) => sum + t.amount, 0);
        const fromPiggy = data.transactions.filter(t => t.type === 'savings_withdrawal').reduce((sum, t) => sum + t.amount, 0);
        const totalLimits = Object.values(data.limits).reduce((sum, val) => sum + (Number(val) || 0), 0);
        
        return {
          availableBalance: income - expense - toPiggy,
          piggyBalance: toPiggy - fromPiggy,
          planningBalance: income - toPiggy - totalLimits, // Сколько денег еще не распределено по лимитам
          totalIncome: income
        };
      }, [data]);

      return (
        <div className="flex flex-col h-full bg-gray-50">
          <header className="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10">
            <h1 className="text-xl font-bold text-gray-800">Учет финансов</h1>
            <div className="text-sm font-medium text-gray-500">{new Date().toLocaleDateString('ru-RU', {day: 'numeric', month: 'long'})}</div>
          </header>
          
          <main className="flex-1 overflow-y-auto pb-20">
            {activeTab === 'home' && <Dashboard data={data} stats={stats} deleteTransaction={deleteTransaction} />}
            {activeTab === 'add' && <AddTransaction addTransaction={addTransaction} goals={data.goals} goHome={() => setActiveTab('home')} />}
            {activeTab === 'limits' && <LimitsManager data={data} setData={setData} stats={stats} currentMonth={currentMonth} />}
            {activeTab === 'piggy' && <PiggyBankView data={data} setData={setData} piggyBalance={stats.piggyBalance} />}
            {activeTab === 'stats' && <StatsView data={data} />}
          </nav>

          <nav className="bg-white border-t border-gray-200 fixed bottom-0 w-full flex justify-around p-2 z-20 pb-safe">
            <NavBtn id="home" icon="ph-house" label="Главная" active={activeTab} set={setActiveTab} />
            <NavBtn id="limits" icon="ph-list-numbers" label="Лимиты" active={activeTab} set={setActiveTab} />
            <NavBtn id="add" icon="ph-plus-circle" iconClass="text-[28px] text-blue-600" label="Добавить" active={activeTab} set={setActiveTab} />
            <NavBtn id="piggy" icon="ph-piggy-bank" label="Копилка" active={activeTab} set={setActiveTab} />
            <NavBtn id="stats" icon="ph-chart-pie-slice" label="Отчеты" active={activeTab} set={setActiveTab} />
          </nav>
        </div>
      );
    }

    function NavBtn({ id, icon, iconClass, label, active, set }) {
      return (
        <button onClick={() => set(id)} className={`flex flex-col items-center p-2 transition-colors ${active === id ? 'text-blue-600' : 'text-gray-400'}`}>
          <i className={`ph ${icon} ${iconClass || "text-2xl"}`}></i>
          <span className="text-[10px] mt-1">{label}</span>
        </button>
      );
    }

    function Dashboard({ data, stats, deleteTransaction }) {
      const recent = data.transactions.slice(0, 10);
      return (
        <div className="p-4 space-y-6">
          <div className="grid grid-cols-2 gap-4">
            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
              <div className="text-xs text-gray-500 mb-1">Доступно (Факт)</div>
              <div className={`text-xl font-bold ${stats.availableBalance < 0 ? 'text-red-500' : 'text-gray-800'}`}>{stats.availableBalance.toLocaleString()} ₽</div>
            </div>
            <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-4 rounded-2xl shadow-sm text-white">
              <div className="text-xs text-indigo-100 mb-1">В копилке</div>
              <div className="text-xl font-bold">{stats.piggyBalance.toLocaleString()} ₽</div>
            </div>
          </div>
          <div className="space-y-3">
            <h2 className="text-lg font-bold px-1">История операций</h2>
            {recent.length === 0 ? <p className="text-center text-gray-400 py-10">Пока нет записей</p> : 
              recent.map(t => (
                <div key={t.id} className="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center border border-gray-50">
                  <div>
                    <div className="font-semibold text-sm">{t.type === 'income' ? 'Доход' : t.category || (t.type.includes('savings') ? 'Копилка' : 'Расход')}</div>
                    <div className="text-[10px] text-gray-400 font-medium">{new Date(t.date).toLocaleDateString('ru-RU')} {t.note && `• ${t.note}`}</div>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className={`font-bold ${t.type === 'income' ? 'text-green-500' : 'text-gray-800'}`}>{t.type === 'income' ? '+' : '-'}{t.amount} ₽</span>
                    <button onClick={() => deleteTransaction(t.id)} className="text-gray-300 hover:text-red-500 transition-colors"><i className="ph ph-trash text-lg"></i></button>
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      );
    }

    function AddTransaction({ addTransaction, goals, goHome }) {
      const [type, setType] = useState('expense');
      const [amount, setAmount] = useState('');
      const [category, setCategory] = useState(CATEGORIES[0]);
      const [note, setNote] = useState('');

      const submit = (e) => {
        e.preventDefault();
        if(!amount || isNaN(amount) || Number(amount) <= 0) return;
        addTransaction({ type, amount: Number(amount), category: type === 'expense' ? category : null, note });
        goHome();
      };

      return (
        <form onSubmit={submit} className="p-4 space-y-5">
          <div className="flex bg-gray-200 p-1 rounded-xl shadow-inner">
            {[
              {id:'expense', l:'Расход'}, 
              {id:'income', l:'Доход'}, 
              {id:'savings_deposit', l:'В копилку'}, 
              {id:'savings_withdrawal', l:'Из копилки'}
            ].map(t => (
              <button key={t.id} type="button" onClick={() => setType(t.id)} className={`flex-1 py-2 text-[10px] font-black uppercase tracking-tighter rounded-lg transition-all ${type === t.id ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>
                {t.l}
              </button>
            ))}
          </div>
          <div className="space-y-1">
            <label className="text-xs font-bold text-gray-400 ml-2 uppercase">Сумма</label>
            <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.00" className="w-full p-4 bg-white border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none text-2xl font-bold transition-all shadow-sm" inputMode="decimal" />
          </div>
          {type === 'expense' && (
            <div className="space-y-1">
              <label className="text-xs font-bold text-gray-400 ml-2 uppercase">Категория</label>
              <select value={category} onChange={e => setCategory(e.target.value)} className="w-full p-4 bg-white border rounded-2xl font-medium outline-none shadow-sm">{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
            </div>
          )}
          <div className="space-y-1">
            <label className="text-xs font-bold text-gray-400 ml-2 uppercase">Заметка</label>
            <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="На что потрачено..." className="w-full p-4 bg-white border rounded-2xl outline-none shadow-sm" />
          </div>
          <button type="submit" className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-lg shadow-blue-200 active:scale-[0.98] transition-all uppercase tracking-widest">Сохранить</button>
        </form>
      );
    }

    function LimitsManager({ data, setData, stats, currentMonth }) {
      const [isModalOpen, setModal] = useState(false);
      const [transfer, setTransfer] = useState({ from: CATEGORIES[0], to: CATEGORIES[1], amount: '' });

      const monthExpenses = useMemo(() => {
        const sums = {};
        CATEGORIES.forEach(c => sums[c] = 0);
        data.transactions.filter(t => t.type === 'expense' && t.date.startsWith(currentMonth)).forEach(t => { if(sums[t.category] !== undefined) sums[t.category] += t.amount });
        return sums;
      }, [data.transactions, currentMonth]);

      const updateLimit = (cat, val) => {
        const num = val === '' ? 0 : Number(val);
        setData(prev => ({ ...prev, limits: { ...prev.limits, [cat]: num } }));
      };

      const handleTransfer = () => {
        const val = Number(transfer.amount);
        if (!val || val <= 0 || transfer.from === transfer.to || data.limits[transfer.from] < val) return;
        setData(prev => ({
          ...prev,
          limits: { ...prev.limits, [transfer.from]: prev.limits[transfer.from] - val, [transfer.to]: prev.limits[transfer.to] + val }
        }));
        setModal(false);
        setTransfer({...transfer, amount: ''});
      };

      return (
        <div className="p-4 space-y-4">
          {/* Информационная панель планирования */}
          <div className="bg-white p-5 rounded-3xl border border-blue-100 shadow-sm mb-6 flex justify-between items-center">
            <div>
              <div className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Свободно для планирования</div>
              <div className={`text-2xl font-black ${stats.planningBalance < 0 ? 'text-red-500' : 'text-blue-600'}`}>
                {stats.planningBalance.toLocaleString()} ₽
              </div>
            </div>
            <button onClick={() => setModal(true)} className="bg-blue-50 text-blue-600 p-3 rounded-2xl active:bg-blue-100 transition-colors">
              <i className="ph ph-arrows-left-right text-xl font-bold"></i>
            </button>
          </div>

          <div className="flex justify-between items-center px-2">
            <h2 className="text-lg font-black text-gray-800 uppercase tracking-tight">Распределение лимитов</h2>
          </div>

          <div className="space-y-4">
            {CATEGORIES.map(cat => {
              const limit = data.limits[cat] || 0;
              const spent = monthExpenses[cat] || 0;
              const isOver = spent > limit && limit > 0;
              
              return (
                <div key={cat} className="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm transition-all active:shadow-md">
                  <div className="flex justify-between items-start mb-3">
                    <span className="font-bold text-gray-700 text-sm leading-tight flex-1 mr-4">{cat}</span>
                    <div className="flex flex-col items-end">
                      <input 
                        type="number" 
                        value={limit === 0 ? '' : limit} 
                        onChange={(e) => updateLimit(cat, e.target.value)}
                        placeholder="0"
                        className="w-24 text-right bg-blue-50/50 border-none rounded-xl p-2 font-black text-blue-700 outline-none focus:ring-2 focus:ring-blue-300 transition-all"
                        inputMode="numeric"
                      />
                      <span className="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-tighter">Потрачено: {spent} ₽</span>
                    </div>
                  </div>
                  <div className="h-2 w-full bg-gray-100 rounded-full overflow-hidden">
                    <div className={`h-full transition-all duration-700 ${isOver ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${limit > 0 ? Math.min(100, (spent/limit)*100) : 0}%` }} />
                  </div>
                </div>
              );
            })}
          </div>

          {isModalOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 z-50">
              <div className="bg-white rounded-[32px] w-full p-6 space-y-5 shadow-2xl animate-in zoom-in-95 duration-200">
                <h3 className="font-black text-xl text-center uppercase tracking-tight">Перенос баланса</h3>
                <div className="space-y-4">
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-gray-400 ml-2 uppercase">Забрать у:</label>
                    <select value={transfer.from} onChange={e=>setTransfer({...transfer, from:e.target.value})} className="w-full p-4 bg-gray-50 border-none rounded-2xl font-bold">{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select>
                  </div>
                  <div className="flex justify-center"><i className="ph ph-arrow-down text-blue-600 text-2xl"></i></div>
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-gray-400 ml-2 uppercase">Отдать:</label>
                    <select value={transfer.to} onChange={e=>setTransfer({...transfer, to:e.target.value})} className="w-full p-4 bg-gray-50 border-none rounded-2xl font-bold">{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select>
                  </div>
                  <input type="number" value={transfer.amount} onChange={e=>setTransfer({...transfer, amount:e.target.value})} className="w-full p-4 bg-blue-50 border-none rounded-2xl font-black text-center text-xl" placeholder="0" />
                </div>
                <div className="flex gap-3 mt-2">
                  <button onClick={()=>setModal(false)} className="flex-1 py-4 bg-gray-100 rounded-2xl font-bold text-gray-500 active:bg-gray-200">Отмена</button>
                  <button onClick={handleTransfer} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-100 active:scale-95">Подтвердить</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function PiggyBankView({ data, setData, piggyBalance }) {
      const [goal, setGoal] = useState({ name: '', target: '' });
      return (
        <div className="p-4 space-y-6">
          <div className="bg-gradient-to-br from-indigo-600 to-purple-700 p-8 rounded-[32px] text-white text-center shadow-xl relative overflow-hidden">
            <div className="absolute top-0 right-0 p-8 opacity-10"><i className="ph ph-piggy-bank text-[120px]"></i></div>
            <i className="ph ph-piggy-bank text-5xl block mb-2"></i>
            <div className="text-[10px] font-bold uppercase tracking-[0.2em] opacity-60 mb-1">Ваши накопления</div>
            <div className="text-4xl font-black tracking-tighter">{piggyBalance.toLocaleString()} ₽</div>
          </div>
          <div className="space-y-4">
            <h3 className="font-black text-lg px-2 uppercase tracking-tight">Цели накопления</h3>
            <div className="flex gap-2">
              <input type="text" placeholder="На что копим?" value={goal.name} onChange={e=>setGoal({...goal, name:e.target.value})} className="flex-1 p-4 bg-white border border-gray-100 rounded-2xl text-sm font-bold shadow-sm outline-none focus:ring-2 focus:ring-indigo-500" />
              <input type="number" placeholder="Сумма" value={goal.target} onChange={e=>setGoal({...goal, target:e.target.value})} className="w-28 p-4 bg-white border border-gray-100 rounded-2xl text-sm font-bold shadow-sm outline-none focus:ring-2 focus:ring-indigo-500" />
              <button onClick={()=>{ if(goal.name && goal.target) setData(prev=>({...prev, goals:[...prev.goals, {id:Date.now(), ...goal}]})); setGoal({name:'', target:''}) }} className="bg-indigo-600 text-white w-14 rounded-2xl shadow-lg flex items-center justify-center active:scale-90 transition-all"><i className="ph ph-plus-bold text-xl"></i></button>
            </div>
            <div className="grid gap-3">
              {data.goals.map(g => (
                <div key={g.id} className="bg-white p-5 rounded-3xl border border-gray-50 flex justify-between items-center shadow-sm">
                  <div>
                    <div className="font-black text-gray-800 uppercase text-xs tracking-tight mb-1">{g.name}</div>
                    <div className="text-sm font-bold text-indigo-600">{Number(g.target).toLocaleString()} ₽</div>
                  </div>
                  <button onClick={()=>setData(prev=>({...prev, goals:prev.goals.filter(x=>x.id!==g.id)}))} className="text-gray-200 hover:text-red-500 p-2 transition-colors"><i className="ph ph-trash-simple text-xl"></i></button>
                </div>
              ))}
              {data.goals.length === 0 && <p className="text-center text-gray-300 font-bold py-10 uppercase text-[10px] tracking-widest">Нет активных целей</p>}
            </div>
          </div>
        </div>
      );
    }

    function StatsView({ data }) {
      const filtered = data.transactions.filter(t => t.type === 'expense');
      const total = filtered.reduce((s, t) => s + t.amount, 0);
      const agg = {};
      filtered.forEach(t => { agg[t.category] = (agg[t.category] || 0) + t.amount; });
      const chart = Object.entries(agg).sort((a,b)=>b[1]-a[1]);

      return (
        <div className="p-4 space-y-6">
          <div className="bg-white p-8 rounded-[32px] shadow-sm text-center border border-gray-50">
            <div className="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-2">Общие расходы</div>
            <div className="text-4xl font-black text-gray-800 tracking-tighter">{total.toLocaleString()} ₽</div>
          </div>
          <div className="space-y-4 px-1">
            <h3 className="font-black text-sm uppercase text-gray-400 tracking-widest">Детализация категорий</h3>
            {chart.map(([name, val], i) => (
              <div key={name} className="space-y-2">
                <div className="flex justify-between text-xs font-black uppercase tracking-tighter">
                  <span className="text-gray-600">{name}</span>
                  <span className="text-gray-900">{val.toLocaleString()} ₽</span>
                </div>
                <div className="h-2.5 w-full bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full bg-blue-600 rounded-full" style={{ width: `${(val/total)*100}%` }} />
                </div>
              </div>
            ))}
            {chart.length === 0 && <p className="text-center text-gray-300 font-bold py-10 uppercase text-[10px] tracking-widest">Данных пока нет</p>}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

```
